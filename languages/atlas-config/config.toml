name = "Atlas Config"
grammar = "hcl"
path_suffixes = ["atlas.hcl"]
line_comments = ["# ", "// "]
tab_size = 2
hard_tabs = false
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false }
]
