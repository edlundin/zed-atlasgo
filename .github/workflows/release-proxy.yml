name: Build Proxy Release Assets

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-proxy:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: atlas-ls-zed-proxy-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: atlas-ls-zed-proxy-darwin-amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: atlas-ls-zed-proxy-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: atlas-ls-zed-proxy-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: atlas-ls-zed-proxy-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build proxy
        run: cargo build --release --bin atlas-ls-zed-proxy --target ${{ matrix.target }}

      - name: Prepare proxy artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/atlas-ls-zed-proxy ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Prepare proxy artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/atlas-ls-zed-proxy.exe ${{ matrix.asset }}

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  check-extension:
    name: Check extension WASM
    needs: build-proxy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Check extension WASM
        run: cargo check --target wasm32-wasip1

  release:
    name: Publish proxy release assets
    needs: [build-proxy, check-extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
