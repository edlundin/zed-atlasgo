name: Build Bundled Proxies

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-proxy:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: atlas-ls-zed-proxy-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: atlas-ls-zed-proxy-darwin-amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: atlas-ls-zed-proxy-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: atlas-ls-zed-proxy-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: atlas-ls-zed-proxy-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build proxy
        run: cargo build --release --bin atlas-ls-zed-proxy --target ${{ matrix.target }}

      - name: Prepare proxy artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/atlas-ls-zed-proxy ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Prepare proxy artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/atlas-ls-zed-proxy.exe ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  build-extension:
    name: Build extension with bundled proxy artifacts
    needs: build-proxy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: bundled-proxy
          merge-multiple: true

      - name: Verify bundled proxy artifacts
        run: |
          test -f bundled-proxy/atlas-ls-zed-proxy-darwin-arm64
          test -f bundled-proxy/atlas-ls-zed-proxy-darwin-amd64
          test -f bundled-proxy/atlas-ls-zed-proxy-linux-arm64
          test -f bundled-proxy/atlas-ls-zed-proxy-linux-amd64
          test -f bundled-proxy/atlas-ls-zed-proxy-windows-amd64.exe

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Check extension WASM
        run: cargo check --target wasm32-wasip1

      - name: Upload bundled proxy set
        uses: actions/upload-artifact@v4
        with:
          name: bundled-proxy
          path: bundled-proxy/*
          if-no-files-found: error
